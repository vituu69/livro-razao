version: "2"
sql:
  - engine: "postgresql"
    queries: "postgres/queries/"
    schema: "postgres/migrations/"
    gen:
      go:
        package: "sqlc"
        out: "postgres/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type: "string"
          - column: "entries.debit"
            go_type: "string"
          - column: "entries.credit"
            go_type: "string"
          - column: "accounts.balance"
            go_type: "string"
          - db_type: "operation_type"
            go_type: "string"